<?xml version="1.0" encoding="UTF-8"?>
<!--
  THG Services orb logo — extracted from src/components/Logo.tsx for use
  as a portable asset (Claude Design, OG references, partner sites, etc).

  Glossy 3D blue sphere: cyan center -> primary blue -> deep blue -> teal
  edge, with an outer halo, upper-left sheen highlight, inner shadow rim,
  and a hairline edge ring.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="THG Services orb logo"
>
  <defs>
    <!-- Main orb core: cyan center -> primary blue -> deep blue -> teal edge -->
    <radialGradient id="thg-orb-core" cx="38%" cy="34%" r="68%">
      <stop offset="0%" stop-color="hsl(180 95% 80%)" stop-opacity="1" />
      <stop offset="38%" stop-color="hsl(221 83% 53%)" stop-opacity="1" />
      <stop offset="78%" stop-color="hsl(220 80% 38%)" stop-opacity="1" />
      <stop offset="100%" stop-color="hsl(160 60% 28%)" stop-opacity="0.95" />
    </radialGradient>

    <!-- Bright sheen highlight upper-left -->
    <radialGradient id="thg-orb-sheen" cx="30%" cy="24%" r="34%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>

    <!-- Soft outer glow halo -->
    <radialGradient id="thg-orb-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="hsl(221 83% 53%)" stop-opacity="0.5" />
      <stop offset="55%" stop-color="hsl(180 80% 55%)" stop-opacity="0.12" />
      <stop offset="100%" stop-color="hsl(221 83% 53%)" stop-opacity="0" />
    </radialGradient>

    <!-- Subtle inner shadow rim for depth -->
    <radialGradient id="thg-orb-inner" cx="50%" cy="60%" r="60%">
      <stop offset="60%" stop-color="rgba(0,0,0,0)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)" />
    </radialGradient>
  </defs>

  <!-- Outer glow halo (slightly larger than the orb) -->
  <circle cx="32" cy="32" r="30" fill="url(#thg-orb-glow)" />

  <!-- Main orb -->
  <circle cx="32" cy="32" r="22" fill="url(#thg-orb-core)" />

  <!-- Inner rim depth -->
  <circle cx="32" cy="32" r="22" fill="url(#thg-orb-inner)" />

  <!-- Sheen highlight -->
  <ellipse cx="25" cy="22" rx="11" ry="8" fill="url(#thg-orb-sheen)" />

  <!-- Hairline edge ring -->
  <circle
    cx="32"
    cy="32"
    r="22"
    fill="none"
    stroke="rgba(255,255,255,0.18)"
    stroke-width="0.6"
  />
</svg>
